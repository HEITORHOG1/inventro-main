# =============================================
# Inventro — Docker Compose Override (Desenvolvimento)
# =============================================
# Este arquivo é carregado AUTOMATICAMENTE pelo Docker Compose
# quando você roda: docker compose up -d
#
# Adiciona: volume mount (código ao vivo), phpMyAdmin, porta MySQL,
#           PHP com display_errors, OPCache desabilitado.

services:
  # =========================================
  # Override do App para desenvolvimento
  # =========================================
  app:
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/php/php.dev.ini:/usr/local/etc/php/conf.d/custom.ini
      - app_logs:/var/www/html/application/logs
    environment:
      APP_ENV: development
      CI_COOKIE_SECURE: "false"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  # =========================================
  # Override do DB para desenvolvimento
  # =========================================
  db:
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # =========================================
  # phpMyAdmin (apenas desenvolvimento)
  # =========================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: inventro_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${DB_USERNAME:-inventro_user}
      PMA_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - inventro_network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
