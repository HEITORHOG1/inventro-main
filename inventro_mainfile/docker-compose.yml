# =============================================
# Inventro — Docker Compose (Base / Produção)
# =============================================
# Este é o compose BASE. Em dev, o docker-compose.override.yml
# é carregado automaticamente pelo Docker Compose.
#
# Dev:  docker compose up -d --build        (carrega override automaticamente)
# Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  # =========================================
  # Servidor Web PHP + Apache
  # =========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventro_app
    restart: always
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-inventro_db}
      DB_USERNAME: ${DB_USERNAME:-inventro_user}
      DB_PASSWORD: ${DB_PASSWORD}
      CI_ENCRYPTION_KEY: ${CI_ENCRYPTION_KEY}
      CI_COOKIE_SECURE: ${CI_COOKIE_SECURE:-true}
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - app_logs:/var/www/html/application/logs
      - app_uploads:/var/www/html/admin_assets/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - inventro_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # =========================================
  # Banco de Dados MySQL 8.0
  # =========================================
  db:
    image: mysql:8.0
    container_name: inventro_db
    restart: always
    # SEM ports expostas — só acessível via rede interna
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --init-connect='SET NAMES utf8mb4'
      --default-authentication-plugin=mysql_native_password
      --max-connections=150
      --innodb-buffer-pool-size=256M
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-inventro_db}
      MYSQL_USER: ${DB_USERNAME:-inventro_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - inventro_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - inventro_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  inventro_network:
    driver: bridge

volumes:
  inventro_mysql_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local
