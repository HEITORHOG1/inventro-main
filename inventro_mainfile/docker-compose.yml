# =============================================
# Inventro — Docker Compose (Base / Produção)
# =============================================
# Este é o compose BASE. Em dev, o docker-compose.override.yml
# é carregado automaticamente pelo Docker Compose.
#
# Dev:  docker compose up -d --build        (carrega override automaticamente)
# Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  # =========================================
  # Servidor Web PHP + Apache
  # =========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventro_app
    restart: always
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-inventro_db}
      DB_USERNAME: ${DB_USERNAME:-inventro_user}
      DB_PASSWORD: ${DB_PASSWORD}
      CI_ENCRYPTION_KEY: ${CI_ENCRYPTION_KEY}
      CI_COOKIE_SECURE: ${CI_COOKIE_SECURE:-true}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - app_logs:/var/www/html/application/logs
      - app_uploads:/var/www/html/admin_assets/uploads
      - product_images:/var/www/html/application/modules/item/assets/images
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - inventro_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # =========================================
  # Banco de Dados MySQL 8.0
  # =========================================
  db:
    image: mysql:8.0
    container_name: inventro_db
    restart: always
    # SEM ports expostas — só acessível via rede interna
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --init-connect='SET NAMES utf8mb4'
      --default-authentication-plugin=mysql_native_password
      --max-connections=150
      --innodb-buffer-pool-size=256M
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-inventro_db}
      MYSQL_USER: ${DB_USERNAME:-inventro_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - inventro_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - inventro_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # =========================================
  # n8n — Automação de Workflows (opcional)
  # =========================================
  # Só sobe com: docker compose --profile online up -d
  n8n:
    image: n8nio/n8n:latest
    container_name: inventro_n8n
    restart: always
    profiles:
      - online
    entrypoint: ["tini", "--", "/home/node/entrypoint.sh"]
    environment:
      # n8n usa SQLite por padrão (armazenado em /home/node/.n8n)
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/}
      N8N_SECURE_COOKIE: "false"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID:-985707381298189}
      GENERIC_TIMEZONE: ${TZ:-America/Sao_Paulo}
      TZ: ${TZ:-America/Sao_Paulo}
      # Auto-provisioning: credenciais do owner (criado automaticamente)
      N8N_OWNER_EMAIL: ${N8N_OWNER_EMAIL:-admin@inventro.com}
      N8N_OWNER_PASSWORD: ${N8N_OWNER_PASSWORD:-Inventro2026}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./docker/n8n/workflows:/home/node/workflows:ro
      - ./docker/n8n/entrypoint.sh:/home/node/entrypoint.sh:ro
      - ./docker/n8n/provision.js:/home/node/provision.js:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inventro_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # =========================================
  # Redis — Sessões, cache, locks (core)
  # =========================================
  # Usado pelo PDV (sessões, stock locks) e opcionalmente pelo n8n.
  redis:
    image: redis:7-alpine
    container_name: inventro_redis
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - inventro_network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # =========================================
  # Backup automático MySQL (core)
  # =========================================
  backup:
    image: databack/mysql-backup:latest
    container_name: inventro_backup
    restart: always
    command: >
      dump
      --server=db
      --port=3306
      --user=root
      --pass=${DB_ROOT_PASSWORD}
      --include=${DB_DATABASE:-inventro_db}
      --frequency=1440
      --begin=0300
      --retention=7c
      --compression=gzip
      --safechars
      --target=file:///db
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - backup_data:/db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - inventro_network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

networks:
  inventro_network:
    driver: bridge

volumes:
  inventro_mysql_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local
  product_images:
    driver: local
  n8n_data:
    driver: local
  redis_data:
    driver: local
  backup_data:
    driver: local
