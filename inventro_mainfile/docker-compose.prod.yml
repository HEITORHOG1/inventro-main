# =============================================
# Inventro — Docker Compose Produção (Hostiger)
# =============================================
# Usar com: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# Ou:       make prod
#
# Este arquivo NÃO é carregado automaticamente.
# Quando você usa -f, o override.yml também NÃO é carregado.
# Então aqui só precisamos dos overrides específicos de produção
# em cima da base (docker-compose.yml).

services:
  # =========================================
  # Override do App para produção
  # =========================================
  app:
    volumes:
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - app_logs:/var/www/html/application/logs
      - app_uploads:/var/www/html/admin_assets/uploads
      # Código NÃO montado — usa o baked na imagem (COPY do Dockerfile)
    environment:
      APP_ENV: production
      CI_COOKIE_SECURE: "true"

  # =========================================
  # Override n8n para produção
  # =========================================
  n8n:
    restart: always
    # NÃO expor porta — acesso via reverse proxy ou rede interna
    # ports: []  # Removido intencionalmente
    environment:
      N8N_LOG_LEVEL: warn
      N8N_SECURE_COOKIE: "true"
      N8N_PROTOCOL: https
      # Trocar pelo domínio real em produção
      N8N_HOST: ${N8N_HOST:-n8n.inventro.com.br}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://n8n.inventro.com.br/}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # =========================================
  # Override Redis para produção
  # =========================================
  redis:
    restart: always
    # NÃO expor porta em produção
    # ports: []
