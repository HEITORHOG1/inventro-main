# =============================================
# Grafana — Provisioning de Dashboards
# =============================================
# Carrega dashboards JSON automaticamente ao iniciar.

apiVersion: 1

providers:
  - name: 'Inventro Dashboards'
    orgId: 1
    folder: 'Inventro'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
