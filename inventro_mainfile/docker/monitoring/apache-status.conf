# =============================================
# Apache server-status — Apenas para monitoramento interno
# =============================================
# Expõe métricas do Apache para o apache-exporter.
# Acessível SOMENTE pela rede Docker interna (172.x.x.x).

<Location "/server-status">
    SetHandler server-status
    Require ip 172.0.0.0/8
    Require ip 127.0.0.1
</Location>

# Métricas estendidas (tempo por request, bytes, etc.)
ExtendedStatus On
